
<div class="col-md-6 offset-md-3">
  <h3>Update Employee Details</h3>
  <form (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="firstName">First Name:</label>
    <input type="text" id="firstName" class="form-control" [(ngModel)]="employee.firstName" name="firstName">
  </div>
  <div class="form-group">
    <label for="lastName">Last Name:</label>
    <input type="text" id="lastName" class="form-control" [(ngModel)]="employee.lastName" name="lastName">
  </div>
  <div class="form-group">
    <label for="email">Email:</label>
    <input type="email" id="email" class="form-control" [(ngModel)]="employee.emailId" name="emailId">
  </div>
  <button type="submit" class="btn btn-primary">Submit</button>
